model = "gpt-5.5"
model_reasoning_effort = "high"
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[sandbox_workspace_write]
network_access = false
exclude_slash_tmp = true
exclude_tmpdir_env_var = true

[features]
hooks = true
computer_use = false

[[hooks.SessionStart]]
matcher = "startup|resume"

[[hooks.SessionStart.hooks]]
type = "command"
command = "$HOME/bin/set_tmux_agent_status ready"

[[hooks.UserPromptSubmit]]

[[hooks.UserPromptSubmit.hooks]]
type = "command"
command = "$HOME/bin/set_tmux_agent_status running"

[[hooks.PreToolUse]]
matcher = "Bash"

[[hooks.PreToolUse.hooks]]
type = "command"
command = "$HOME/bin/set_tmux_agent_status running-tool"

[[hooks.PreToolUse]]
matcher = "Bash"

[[hooks.PostToolUse]]
matcher = "Bash"

[[hooks.PostToolUse.hooks]]
type = "command"
command = "$HOME/bin/set_tmux_agent_status running"

[[hooks.PermissionRequest]]

[[hooks.PermissionRequest.hooks]]
type = "command"
command = "$HOME/bin/set_tmux_agent_status needs-input"

[[hooks.PermissionRequest.hooks]]
type = "command"
command = "afplay /System/Library/Sounds/Funk.aiff"

[[hooks.Stop]]

[[hooks.Stop.hooks]]
type = "command"
command = "$HOME/bin/set_tmux_agent_status done"

[[hooks.Stop.hooks]]
type = "command"
command = "afplay /System/Library/Sounds/Submarine.aiff"
