## Set prefix to Ctrl-Space
# https://stackoverflow.com/questions/67320205/binding-prefix-to-c-space-in-tmux-doesnt-work-when-you-have-nested-sessions
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix



## Configure UI
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off # On session kill, keeps the client attached to tmux and switches to a remaining session if one exists.

set-option -g set-titles on # Sets terminal window title
set-option -g set-titles-string "#S : #W"

# Pane visuals
set -g pane-border-format ' #[bold]#P #[default]#{?pane_title,#{pane_title},#{pane_current_command}} '
set -g pane-border-status top
set -g window-style 'fg=colour247,bg=colour236'
set -g window-active-style 'fg=default,bg=colour234'
set -g pane-border-style "fg=colour238 bg=default"
set -g pane-active-border-style "fg=colour39 bg=default"

# Status bar
set -g status-style 'fg=colour252,bg=colour236'

# Status line
set -g status-interval 5
set -g status-justify "left"
set -g status-left "#{?client_prefix,:prefix: , } #S #[default]"
set -g status-left-length 40
set -g status-right "" # Empty right status
set -g status-style "bg=colour236,fg=colour250"
set -g window-status-format '#I:#W#{?@agent_status, #{?#{==:#{@agent_status},running},#[fg=colour46],#{?#{==:#{@agent_status},needs-input},#[fg=colour220],#{?#{==:#{@agent_status},done},#[fg=colour39],#{?#{==:#{@agent_status},ready},#[fg=colour39],#[fg=colour160]}}}}[#{@agent_status}]#[default],}'
set -g window-status-current-format ' #I:#W#{?@agent_status, [#{@agent_status}] , }'
set -g window-status-current-style "bg=colour33,fg=colour255,bold"

# Agent status hooks (read by window-status-format and window-status-current-format)
set-hook -g after-select-window 'set-window-option -q -t "#{window_id}" @agent_status ""'
set-hook -g after-new-window 'set-window-option -q -t "#{window_id}" @agent_status ""'

# Mouse Support
set -g mouse on
bind m if -F '#{mouse}' 'set -g mouse off \; display-message "Mouse: off"' 'set -g mouse on \; display-message "Mouse: on"'



## Copy-Paste Improvements

set -g set-clipboard on
set -gq allow-passthrough all

# Copy selected text to system clipboard (best effort by platform)
if-shell "command -v pbcopy >/dev/null 2>&1" "bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'pbcopy'"
if-shell "command -v pbcopy >/dev/null 2>&1" "bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'pbcopy'"
if-shell "command -v wl-copy >/dev/null 2>&1" "bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'wl-copy'"
if-shell "command -v wl-copy >/dev/null 2>&1" "bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'wl-copy'"
if-shell "command -v xclip >/dev/null 2>&1" "bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard -in'"
if-shell "command -v xclip >/dev/null 2>&1" "bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard -in'"

# Terminal passthrough improvements (Ghostty/kitty)
set -ga terminal-overrides ',xterm-256color:Ms=\E]52;c;%p2%s\007'
set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'



## Keyboard Shortcuts

# Better support for Ctrl+Shift arrow bindings on newer tmux versions
set -gq extended-keys on

# Reload config
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Window and Pane Management

bind -n C-n new-window

bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

bind -n C-Enter split-window -h -c "#{pane_current_path}"
bind -n C-S-Enter split-window -v -c "#{pane_current_path}"

bind -n C-w kill-pane
bind x kill-pane
bind X kill-window

# Pane Navigation

# Shift Left/Right to cycle through windows
bind -n S-Left previous-window
bind -n S-Right next-window

# Shift Up/Down to cycle through panes
bind -n S-Up select-pane -t :.-
bind -n S-Down select-pane -t :.+