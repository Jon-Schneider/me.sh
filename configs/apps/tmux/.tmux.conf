## Set prefix to Ctrl-Space
# https://stackoverflow.com/questions/67320205/binding-prefix-to-c-space-in-tmux-doesnt-work-when-you-have-nested-sessions
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix



## Configure UI
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off # On session kill, keeps the client attached to tmux and switches to a remaining session if one exists.
set -g window-size largest

set-option -g set-titles on # Sets terminal window title
set-option -g set-titles-string "#S : #W"
bind-key , command-prompt -I "#W" "set-option -w @manual_window_name 1 \; rename-window '%%'"

# Pane visuals
set -g pane-border-format ' #[bold]#P #[default]#{?pane_title,#{pane_title},#{pane_current_command}} '
set -g pane-border-status top
set -g window-style 'fg=colour247,bg=colour236'
set -g window-active-style 'fg=default,bg=colour234'
set -g pane-border-style "fg=colour238 bg=default"
set -g pane-active-border-style "fg=colour39 bg=default"

# Status bar
set -g status 3
set -g status-interval 5
set -g status-style "bg=colour236,fg=colour250"

# Line 1: blank spacer
set -g status-format[0] ' '

# Line 2: pane title, path, git branch, and context indicators
set -g status-format[1] '#[align=left]#{P:#{?pane_active,  #[fg=colour39]#{?@shipyard_issue_title,#{@shipyard_issue_title},#{?pane_title,#{pane_title},#{pane_current_command}}}#[default],}}#[align=right]#{?#{==:#{pane_current_command},ssh},#[fg=colour196]#[bold] SSH (#(whoami)@#(hostname)) #[default],}#{?window_zoomed_flag, #[fg=red][Zoomed #P/#{window_panes}],} #[fg=cyan,bold]#{s|$HOME|~|:pane_current_path} #[fg=magenta]#(git -C "#{pane_current_path}" rev-parse --abbrev-ref HEAD 2>/dev/null | sed "s/^/ /")'

# Line 3: session name + window tabs
set -g status-format[2] '#[align=left]#{?client_prefix, :prefix: , } #[fg=cyan,bold]#S#[default] #{W:#[range=window|#{window_index} #{E:window-status-style}]#{T:window-status-format}#[norange default],#[range=window|#{window_index} list=focus #{?#{!=:#{E:window-status-current-style},default},#{E:window-status-current-style},#{E:window-status-style}}]#{T:window-status-current-format}#[norange default]}'

set -g window-status-format ' #I:#W#{?@agent_status, #{?#{==:#{@agent_status},running},#[fg=colour46],#{?#{==:#{@agent_status},running-tool},#[fg=colour183],#{?#{==:#{@agent_status},needs-input},#[fg=colour220],#{?#{==:#{@agent_status},done},#[fg=colour39],#{?#{==:#{@agent_status},ready},#[fg=colour39],#[fg=colour160]}}}}}[#{@agent_status}]#[default] , }'
set -g window-status-current-format ' #I:#W#{?@agent_status, [#{@agent_status}] , }'
set -g window-status-current-style "bg=colour33,fg=colour255,bold"

# Agent status hooks (read by window-status-format and window-status-current-format)
set-hook -g after-select-window 'set-window-option -q -t "#{window_id}" @agent_status ""'
set-hook -g after-new-window 'set-window-option -q -t "#{window_id}" @agent_status ""'
set-hook -g pane-exited 'run-shell "$HOME/bin/clear_tmux_agent_status_if_no_agents #{window_id}"'
set-hook -g pane-died 'run-shell "$HOME/bin/clear_tmux_agent_status_if_no_agents #{window_id}"'
set-hook -g after-kill-pane 'run-shell "$HOME/bin/clear_tmux_agent_status_if_no_agents #{window_id}"'
set-hook -ag after-kill-pane 'select-layout even-horizontal'


# Mouse Support
set -g mouse on
bind m if -F '#{mouse}' 'set -g mouse off \; display-message "Mouse: off"' 'set -g mouse on \; display-message "Mouse: on"'



## Copy-Paste Improvements

set -g set-clipboard on
set -gq allow-passthrough all

# Copy selected text to system clipboard, cleaning agent TUI artifacts on macOS
if-shell "command -v pbcopy >/dev/null 2>&1" "bind -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe '$HOME/bin/clean-agent-copy \"#{pane_id}\" | pbcopy'"
if-shell "command -v pbcopy >/dev/null 2>&1" "bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe '$HOME/bin/clean-agent-copy \"#{pane_id}\" | pbcopy'"
if-shell "command -v pbcopy >/dev/null 2>&1" "bind -T copy-mode    Enter             send-keys -X copy-pipe '$HOME/bin/clean-agent-copy \"#{pane_id}\" | pbcopy'"
if-shell "command -v pbcopy >/dev/null 2>&1" "bind -T copy-mode-vi Enter             send-keys -X copy-pipe '$HOME/bin/clean-agent-copy \"#{pane_id}\" | pbcopy'"
if-shell "command -v pbcopy >/dev/null 2>&1" "bind -T copy-mode-vi y                 send-keys -X copy-pipe '$HOME/bin/clean-agent-copy \"#{pane_id}\" | pbcopy'"
if-shell "command -v wl-copy >/dev/null 2>&1" "bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe 'wl-copy'"
if-shell "command -v wl-copy >/dev/null 2>&1" "bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe 'wl-copy'"
if-shell "command -v xclip >/dev/null 2>&1" "bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe 'xclip -selection clipboard -in'"
if-shell "command -v xclip >/dev/null 2>&1" "bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe 'xclip -selection clipboard -in'"

# When mouse scrolling leaves the pane in copy mode, make normal typing exit
# copy mode and send the typed character to the pane instead of invoking
# copy-mode commands like vi `f` -> jump-forward.
run-shell -b "$HOME/bin/tmux-copy-mode-passthrough-binds"

# Terminal passthrough improvements (Ghostty/kitty)
set -ga terminal-overrides ',xterm-256color:Ms=\E]52;c;%p2%s\007'
set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'



## Keyboard Shortcuts

# Better support for Ctrl+Shift arrow bindings on newer tmux versions
set -gq extended-keys on

# Reload config
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Window and Pane Management
bind -n C-n new-window -c "#{pane_current_path}"
bind N run-shell '$HOME/bin/tmux-app-key "#{pane_id}" --no-micro --app herdr HerdrNewWorkspace -- new-window -c "#{pane_current_path}"'
bind T run-shell '$HOME/bin/tmux-app-key "#{pane_id}" --no-micro --app herdr HerdrNewTab -- new-window -c "#{pane_current_path}"'
bind Q run-shell '$HOME/bin/tmux-app-key "#{pane_id}" --no-micro --app herdr HerdrCloseWorkspace --exec osascript -e "quit app id \"com.mitchellh.ghostty\""'
bind c new-window -c "#{pane_current_path}"
bind -n C-S-n new-window

# Split family. Fed by Ghostty Cmd combos (see ghostty/config); -d keeps focus
# on the original pane instead of following to the new one.
#   prefix+v  Cmd+Enter            split right, focus NEW pane
#   prefix+o  Cmd+Opt+Enter        split right, stay on original (-d)
#   prefix+s  Cmd+Shift+Enter      split down,  focus NEW pane
#   prefix+e  Cmd+Shift+Opt+Enter  split down,  stay on original (-d)
bind v split-window -h -c "#{pane_current_path}" \; select-layout even-horizontal
bind o split-window -h -d -c "#{pane_current_path}" \; select-layout even-horizontal
bind s split-window -v -c "#{pane_current_path}"
bind e split-window -v -d -c "#{pane_current_path}"

# Ghostty Cmd+Delete sends prefix+D: delete to start of line in micro,
# otherwise Ctrl+U (kill to start of line in shell).
bind D run-shell '$HOME/bin/tmux-micro-key "#{pane_id}" MicroDeleteStart -- send-keys -t "#{pane_id}" C-u'

# Ghostty Cmd+Left sends prefix+B: start of line in micro,
# otherwise keep the previous Home behavior.
bind B run-shell '$HOME/bin/tmux-micro-key "#{pane_id}" MicroStartOfLine -- send-keys -t "#{pane_id}" Home'

# Ghostty Cmd+Shift+Left sends prefix+Y: select to start of line in micro,
# otherwise keep pane navigation.
bind Y run-shell '$HOME/bin/tmux-micro-key "#{pane_id}" MicroSelectStart -- select-pane -L'

# Ghostty Cmd+X/C send prefix+G/F: cut/copy micro selections.
bind G run-shell '$HOME/bin/tmux-micro-key "#{pane_id}" MicroCut'
bind F run-shell '$HOME/bin/tmux-micro-key "#{pane_id}" MicroCopy'

# Ghostty Cmd+S sends prefix+S: save in micro, otherwise Ctrl+S.
bind S run-shell '$HOME/bin/tmux-micro-key "#{pane_id}" C-s -- send-keys -t "#{pane_id}" C-s'

# Ghostty Cmd+Z sends prefix+z: undo in micro, otherwise zoom the pane.
bind z run-shell '$HOME/bin/tmux-micro-key "#{pane_id}" C-z -- resize-pane -t "#{pane_id}" -Z'

# Ghostty Cmd+W closes a Herdr tab, passes through to micro, and otherwise
# kills the tmux pane.
bind -n C-w run-shell '$HOME/bin/tmux-app-key "#{pane_id}" C-w --app herdr HerdrCloseTab -- kill-pane -t "#{pane_id}"'
bind x kill-pane
bind X kill-window

# Pane Navigation

# Karabiner maps Ghostty Cmd+Ctrl+Arrow to F13-F16; Ghostty then sends
# prefix+Arrow. Navigate Herdr tabs/spaces when Herdr owns the pane; otherwise
# retain directional tmux pane navigation.
bind -r Left run-shell '$HOME/bin/tmux-app-key "#{pane_id}" --no-micro --app herdr HerdrPreviousTab -- select-pane -L'
bind -r Right run-shell '$HOME/bin/tmux-app-key "#{pane_id}" --no-micro --app herdr HerdrNextTab -- select-pane -R'
bind -r Up run-shell '$HOME/bin/tmux-app-key "#{pane_id}" --no-micro --app herdr HerdrPreviousWorkspace -- select-pane -U'
bind -r Down run-shell '$HOME/bin/tmux-app-key "#{pane_id}" --no-micro --app herdr HerdrNextWorkspace -- select-pane -D'

bind -T prefix H select-pane -L
bind -T prefix J select-pane -D
bind -T prefix K select-pane -U
# Ghostty Cmd+Shift+Right sends prefix+L: select to end of line in micro,
# otherwise navigate pane right.
bind L run-shell '$HOME/bin/tmux-micro-key "#{pane_id}" MicroSelectEnd -- select-pane -R'

# Shift Left/Right select in micro, otherwise swap window in that direction.
bind -n S-Left run-shell '$HOME/bin/tmux-micro-key "#{pane_id}" MicroSelectLeft -- swap-window -d -t -1'
bind -n S-Right run-shell '$HOME/bin/tmux-micro-key "#{pane_id}" MicroSelectRight -- swap-window -d -t +1'
bind -T prefix n next-window
bind -T prefix p previous-window

bind -n C-S-Up    swap-pane -d -t '{up-of}'
bind -n C-S-Down  swap-pane -d -t '{down-of}'
bind -n C-S-Left  swap-pane -d -t '{left-of}'
bind -n C-S-Right swap-pane -d -t '{right-of}'

# Option+Shift Left/Right select by word in micro, otherwise pass through.
bind -n M-S-Left run-shell '$HOME/bin/tmux-micro-key "#{pane_id}" MicroSelectWordLeft -- send-keys -t "#{pane_id}" M-S-Left'
bind -n M-S-Right run-shell '$HOME/bin/tmux-micro-key "#{pane_id}" MicroSelectWordRight -- send-keys -t "#{pane_id}" M-S-Right'

# Pane Layout

# Window Order
bind-key C-S-Left  swap-window -t -1 \; select-window -t -1
bind-key C-S-Right swap-window -t +1 \; select-window -t +1
